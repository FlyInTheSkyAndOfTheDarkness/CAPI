# Полный прод-стек: БД, Redis, API, фронт (nginx). Запуск:
#   cp .env.prod.example .env.prod && отредактировать секреты
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-capi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-capi}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-capi}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-capi}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-capi}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?required}
      PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
      WEB_ORIGIN: ${WEB_ORIGIN:?required}
      META_GRAPH_API_VERSION: ${META_GRAPH_API_VERSION:-v25.0}
      PORT: 3001

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '${WEB_PORT:-80}:80'

volumes:
  pgdata:
  redisdata:
